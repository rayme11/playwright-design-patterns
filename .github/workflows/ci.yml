# GitHub Actions CI for Playwright Design Patterns
# This workflow runs on every push and pull request to main or any feature branch.
# It runs Playwright tests headlessly and performs a security scan before allowing merges.

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, "Chapter-*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (all specs)
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  agentic-ai:
    name: Agentic AI — Generate → Test → Self-Heal → Report to Jira
    runs-on: ubuntu-22.04
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_ISSUE_KEY: ${{ secrets.JIRA_ISSUE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Step 2 — Generate Playwright test from Jira story
        run: node agentic-ai/generate-playwright-test.js

      - name: Step 3 — Run generated tests + capture JSON results
        run: |
          PLAYWRIGHT_JSON_OUTPUT_NAME=tests/ai-generated/test-results/generated-login.json \
          npx playwright test tests/ai-generated/generated-login.spec.ts --reporter=json || true

      - name: Step 5 — Self-healing agent (detect failure → inspect DOM → patch → rerun)
        run: node agentic-ai/self-heal.js

      - name: Upload generated test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ai-test-results
          path: tests/ai-generated/test-results/

  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (warnings only)
        run: |
          npx eslint . --ext .ts --format unix || (
            echo '::warning::ESLint reported warnings or errors, but CI will continue.'
            exit 0
          )

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (security scan)
        run: npm audit --audit-level=moderate --json > audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json

    # Optionally, fail the job if vulnerabilities are found:
    #   run: npm audit --audit-level=moderate
    # Remove '|| true' above to enforce blocking on vulnerabilities.
